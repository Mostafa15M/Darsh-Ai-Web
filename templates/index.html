<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Darsh Research | AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Orbitron:wght@600&display=swap" rel="stylesheet">
    <style>
        body { background: #0b0f1a; color: white; font-family: 'Cairo', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .chat-scroll { flex: 1; overflow-y: auto; padding: 20px 15px 150px 15px; scroll-behavior: smooth; }
        .bubble { max-width: 85%; margin-bottom: 15px; padding: 12px 16px; border-radius: 15px; font-size: 14px; line-height: 1.5; }
        .user { background: #2563eb; margin-right: auto; border-bottom-right-radius: 2px; }
        .ai { background: #1e293b; border: 1px solid #334155; margin-left: auto; border-bottom-left-radius: 2px; }
        
        /* صندوق البحث المرفوع عشان الموبايل */
        .bottom-container { position: fixed; bottom: 25px; left: 0; right: 0; padding: 0 15px; z-index: 999; }
        .input-wrapper { background: #1e293b; border: 1px solid #3b82f6; border-radius: 20px; display: flex; align-items: center; padding: 5px 10px; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 12px; outline: none; font-size: 14px; }
        button { background: #2563eb; padding: 10px 20px; border-radius: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <header class="p-4 text-center bg-[#0b0f1a] shadow-md">
        <h1 style="font-family:'Orbitron'" class="text-lg text-blue-500">DARSH RESEARCH</h1>
    </header>

    <div id="chatBox" class="chat-scroll">
        <div class="ai bubble">أهلاً يا مصطفى! جرب تسألني "ما هي فوائد البنجر؟" أو أي سؤال حقيقي وشوف النتيجة.</div>
    </div>

    <div class="bottom-container">
        <form id="searchForm" class="input-wrapper shadow-2xl">
            <input type="text" id="userInput" placeholder="اكتب سؤالك هنا..." autocomplete="off">
            <button type="submit">بحث</button>
        </form>
    </div>

    <script>
        const form = document.getElementById('searchForm');
        const box = document.getElementById('chatBox');
        const input = document.getElementById('userInput');

        // ميزة الكتابة حرف بحرف
        function streamText(element, text) {
            let i = 0;
            element.innerHTML = "";
            const interval = setInterval(() => {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                    box.scrollTop = box.scrollHeight;
                } else {
                    clearInterval(interval);
                }
            }, 30);
        }

        form.onsubmit = async (e) => {
            e.preventDefault();
            const q = input.value.trim();
            if(!q) return;

            box.innerHTML += `<div class="user bubble">${q}</div>`;
            input.value = '';
            box.scrollTop = box.scrollHeight;

            const tempAi = document.createElement('div');
            tempAi.className = 'ai bubble';
            tempAi.innerHTML = "...جاري البحث";
            box.appendChild(tempAi);

            try {
                const r = await fetch('/ask', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({query: q})
                });
                const d = await r.json();
                streamText(tempAi, d.answer);
            } catch {
                tempAi.innerHTML = "السيرفر وقع، جرب تاني.";
            }
        };
    </script>
</body>
</html>
