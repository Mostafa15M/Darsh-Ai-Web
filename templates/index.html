<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darsh AI | Cinematic Future</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; background: #020617; color: white;
            font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; min-height: 100vh;
        }
        #starfield { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .cyber-glass {
            background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px);
            border: 1px solid rgba(59, 130, 246, 0.2); box-shadow: 0 0 50px rgba(0, 0, 0, 0.6);
        }
        .darsh-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2.5rem, 10vw, 5rem);
            font-weight: 900; letter-spacing: -2px;
            background: linear-gradient(90deg, #60a5fa, #a78bfa, #3b82f6, #60a5fa);
            background-size: 200% auto;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite; display: inline-block;
        }
        @keyframes shine { to { background-position: 200% center; } }
        .status-badge {
            font-size: 10px; letter-spacing: 3px; color: #60a5fa;
            border: 1px solid rgba(96, 165, 250, 0.2); padding: 2px 10px;
            background: rgba(59, 130, 246, 0.05); display: inline-block;
        }
        .input-glow {
            background: rgba(2, 6, 23, 0.85); border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .input-glow:focus { border-color: #60a5fa; box-shadow: 0 0 20px rgba(96, 165, 250, 0.2); outline: none; }
        .btn-future { background: linear-gradient(45deg, #2563eb, #7c3aed); transition: all 0.3s ease; }
        .btn-future:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(37, 99, 235, 0.4); }
        .orbit-spinner { width: 50px; height: 50px; border-radius: 50%; perspective: 800px; margin: 0 auto; }
        .orbit { position: absolute; width: 100%; height: 100%; border-radius: 50%; }
        .orbit:nth-child(1) { animation: rotate-one 1s linear infinite; border-bottom: 3px solid #60a5fa; }
        .orbit:nth-child(2) { animation: rotate-two 1s linear infinite; border-right: 3px solid #a78bfa; }
        @keyframes rotate-one { 0% { transform: rotateX(35deg) rotateY(-45deg) rotateZ(0deg); } 100% { transform: rotateX(35deg) rotateY(-45deg) rotateZ(360deg); } }
        @keyframes rotate-two { 0% { transform: rotateX(50deg) rotateY(10deg) rotateZ(0deg); } 100% { transform: rotateX(50deg) rotateY(10deg) rotateZ(360deg); } }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <canvas id="starfield"></canvas>
    <div class="cyber-glass w-full max-w-[95%] sm:max-w-2xl p-6 sm:p-10 rounded-[2rem] relative z-10">
        <header class="text-center mb-10">
            <h1 class="darsh-title">DARSH AI</h1>
            <div class="mt-1"><span class="status-badge">NEURAL LINK ACTIVE</span></div>
        </header>
        <form id="mainForm" class="space-y-6">
            <div class="space-y-2">
                <label class="text-[10px] font-bold text-blue-400 uppercase tracking-widest px-2">Source Image</label>
                <input type="file" id="imageInput" accept="image/*" class="w-full input-glow p-3 rounded-xl text-xs file:bg-blue-600 file:border-none file:text-white file:rounded-md cursor-pointer" required>
            </div>
            <div class="space-y-2">
                <label class="text-[10px] font-bold text-blue-400 uppercase tracking-widest px-2">Creative Directive</label>
                <textarea id="promptInput" rows="3" placeholder="Describe the cinematic motion..." class="w-full input-glow rounded-xl p-4 text-sm focus:outline-none transition-all" required></textarea>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <select id="modelSelect" class="w-full input-glow rounded-xl p-4 text-sm focus:outline-none appearance-none cursor-pointer">
                    <option value="3-38">Seedance 1.5 Pro</option>
                    <option value="3-11">Google Veo 3.1</option>
                    <option value="3-35">Kling O1</option>
                </select>
                <button type="submit" class="btn-future text-white font-bold rounded-xl p-4">GENERATE ✨</button>
            </div>
        </form>
        <div id="loader" class="hidden py-12 text-center">
            <div class="orbit-spinner mb-4"><div class="orbit"></div><div class="orbit"></div></div>
            <p class="text-[10px] tracking-widest text-blue-300 uppercase animate-pulse">Computing Neural Frames...</p>
        </div>
        <div id="resultArea" class="hidden mt-10 space-y-6">
            <div class="h-[1px] bg-gradient-to-r from-transparent via-blue-500/50 to-transparent"></div>
            <video id="videoOutput" controls class="w-full rounded-2xl border border-white/10 bg-black"></video>
            <button onclick="location.reload()" class="w-full text-[10px] tracking-widest text-slate-500 hover:text-blue-400 uppercase">New Sequence</button>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');
        let stars = [];
        function initStars() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            stars = [];
            let count = window.innerWidth < 768 ? 100 : 250;
            for (let i = 0; i < count; i++) {
                stars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: Math.random() * 1.5, speed: Math.random() * 0.15 });
            }
        }
        function drawStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.fillStyle = 'white';
            stars.forEach(star => {
                ctx.beginPath(); ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2); ctx.fill();
                star.y += star.speed; if (star.y > canvas.height) star.y = 0;
            });
            requestAnimationFrame(drawStars);
        }
        window.addEventListener('resize', initStars); initStars(); drawStars();

        const form = document.getElementById('mainForm');
        const loader = document.getElementById('loader');
        const resultArea = document.getElementById('resultArea');

        form.onsubmit = async (e) => {
            e.preventDefault();
            form.classList.add('hidden'); loader.classList.remove('hidden');
            const fd = new FormData();
            fd.append('image', document.getElementById('imageInput').files[0]);
            fd.append('prompt', document.getElementById('promptInput').value);
            fd.append('model', document.getElementById('modelSelect').value);
            try {
                const res = await fetch('/generate', { method: 'POST', body: fd });
                const poll = setInterval(async () => {
                    const check = await fetch('/status');
                    const statusData = await check.json();
                    if(statusData.url) {
                        clearInterval(poll);
                        loader.classList.add('hidden'); resultArea.classList.remove('hidden');
                        document.getElementById('videoOutput').src = statusData.url;
                    }
                }, 8000);
            } catch (err) { alert("System Error"); location.reload(); }
        };
    </script>
</body>
</html>
