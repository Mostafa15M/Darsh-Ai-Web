<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Darsh AI | النسخة المتكاملة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #020617; color: white; font-family: 'Cairo', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* الهيدر المطور */
        header { background: #0f172a; border-bottom: 2px solid #1e40af; padding: 12px 15px; display: flex; justify-content: center; align-items: center; position: relative; }
        .logo { font-family: 'Orbitron'; font-size: 22px; color: #3b82f6; text-decoration: none; font-weight: bold; transition: 0.3s; }
        .logo:active { transform: scale(0.95); }
        .tg-icon { position: absolute; left: 15px; color: #0088cc; font-size: 24px; transition: 0.3s; }
        .tg-icon:hover { filter: drop-shadow(0 0 8px #0088cc); }

        /* منطقة المحادثة */
        .chat-area { flex: 1; overflow-y: auto; padding: 20px 15px 150px 15px; scroll-behavior: smooth; }
        .bubble { max-width: 85%; margin-bottom: 18px; padding: 14px 18px; border-radius: 22px; font-size: 15px; line-height: 1.6; animation: slideUp 0.3s ease-out; }
        .user { background: #2563eb; margin-right: auto; border-bottom-right-radius: 4px; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); }
        .ai { background: #1e293b; border: 1px solid #334155; margin-left: auto; border-bottom-left-radius: 4px; }
        
        /* صندوق الكتابة (Input) */
        .bottom-fixed { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(2, 6, 23, 0.9); backdrop-filter: blur(12px); padding: 15px 15px 35px 15px; border-top: 1px solid #1e293b; }
        .input-container { max-width: 700px; margin: 0 auto; background: #0f172a; border: 2px solid #3b82f6; border-radius: 30px; display: flex; align-items: center; padding: 6px 12px; transition: 0.3s; }
        .input-container:focus-within { border-color: #60a5fa; box-shadow: 0 0 20px rgba(59, 130, 246, 0.2); }
        
        input { flex: 1; background: transparent; border: none; color: white; padding: 10px; outline: none; font-size: 15px; }
        
        /* أزرار الرفع والإرسال */
        #imageFile { display: none; }
        .btn-action { color: #94a3b8; font-size: 22px; cursor: pointer; padding: 0 8px; transition: 0.3s; }
        .btn-action:hover { color: #3b82f6; }
        .send-btn { color: #3b82f6; font-size: 24px; }
        
        .img-preview { display: none; width: 45px; height: 45px; border-radius: 10px; margin: 0 10px; border: 1px solid #3b82f6; object-fit: cover; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .ai img { border-radius: 15px; margin-top: 12px; width: 100%; border: 1px solid #3b82f6/30; }
    </style>
</head>
<body>
    <header>
        <a href="https://t.me/DarshEgypt" target="_blank" class="tg-icon"><i class="fab fa-telegram"></i></a>
        <a href="https://darshai.vercel.app/" class="logo">DARSH AI</a>
    </header>

    <div id="chatBox" class="chat-area">
        <div class="ai bubble">أهلاً يا مصطفى! أنا "درش" في أقوى نسخة مجانية.. اسألني، ارفع صورة، أو اطلب مني أرسم لك أي حاجة!</div>
    </div>

    <div class="bottom-fixed">
        <form id="chatForm" class="input-container">
            <label for="imageFile" class="btn-action">
                <i class="fas fa-plus-circle"></i>
            </label>
            <input type="file" id="imageFile" accept="image/*">
            
            <img id="preview" class="img-preview">
            
            <input type="text" id="userInput" placeholder="اسأل درش أو اطلب صورة..." autocomplete="off">
            
            <button type="submit" class="btn-action send-btn">
                <i class="fas fa-paper-plane"></i>
            </button>
        </form>
    </div>

    <script>
        const fileInput = document.getElementById('imageFile');
        const preview = document.getElementById('preview');
        const form = document.getElementById('chatForm');
        const box = document.getElementById('chatBox');
        let currentImageBase64 = null;

        // معالجة اختيار الصورة
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    currentImageBase64 = ev.target.result;
                    preview.src = currentImageBase64;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        };

        function addMessage(text, isUser, img = null) {
            const div = document.createElement('div');
            div.className = `bubble ${isUser ? 'user' : 'ai'}`;
            div.innerText = text;
            if(img) {
                div.innerHTML += `<br><img src="${img}">`;
            }
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        form.onsubmit = async (e) => {
            e.preventDefault();
            const q = document.getElementById('userInput').value.trim();
            if(!q && !currentImageBase64) return;

            addMessage(q, true, currentImageBase64);
            
            // تصفير المدخلات فوراً
            document.getElementById('userInput').value = '';
            preview.style.display = 'none';
            const sentImg = currentImageBase64;
            currentImageBase64 = null;

            // فقاعة التفكير
            const loader = document.createElement('div');
            loader.className = 'ai bubble';
            loader.innerText = "درش بيفكر...";
            box.appendChild(loader);
            box.scrollTop = box.scrollHeight;

            try {
                const r = await fetch('/ask', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ query: q, image: sentImg })
                });
                const d = await r.json();
                box.removeChild(loader);
                addMessage(d.answer, false, d.image);
            } catch {
                loader.innerText = "حصل مشكلة، جرب تاني يا غالي.";
            }
        };
    </script>
</body>
</html>
