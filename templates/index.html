<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darsh Research | محرك بحث ذكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Orbitron:wght@600&display=swap" rel="stylesheet">
    <style>
        body { background: #0b0f1a; color: #f8fafc; font-family: 'Cairo', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .glass-bg { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border-top: 1px solid rgba(255,255,255,0.1); }
        .chat-area { flex: 1; overflow-y: auto; padding: 20px; scroll-behavior: smooth; }
        
        /* فقاعات الكلام المتطورة */
        .bubble { max-width: 80%; margin-bottom: 20px; padding: 14px 20px; border-radius: 20px; font-size: 15px; line-height: 1.6; }
        .user { background: #3b82f6; color: white; margin-right: auto; border-bottom-right-radius: 4px; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3); }
        .ai { background: #1e293b; border: 1px solid #334155; margin-left: auto; border-bottom-left-radius: 4px; }

        /* الأنيميشن اللطيف */
        .typing { display: flex; gap: 4px; padding: 10px; }
        .dot { width: 6px; height: 6px; background: #60a5fa; border-radius: 50%; animation: blink 1.4s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body>
    <header class="p-4 text-center border-b border-white/5">
        <h1 style="font-family:'Orbitron'" class="text-xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">DARSH RESEARCH</h1>
    </header>

    <div id="chatBox" class="chat-area">
        <div class="ai bubble">أهلاً يا مصطفى! أنا محرك بحث دارش الذكي، إيه اللي شاغل بالك النهاردة؟</div>
    </div>

    <div id="wait" class="hidden px-8 py-2"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>

    <div class="glass-bg p-4 pb-8">
        <form id="searchForm" class="max-w-3xl mx-auto relative flex gap-2">
            <input type="text" id="userInput" placeholder="اسأل عن أي معلومة..." 
                class="w-full bg-slate-900/50 border border-slate-700 rounded-2xl py-4 px-5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all">
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 px-8 rounded-2xl font-bold text-sm transition-all active:scale-95">بحث</button>
        </form>
    </div>

    <script>
        const form = document.getElementById('searchForm');
        const box = document.getElementById('chatBox');
        const wait = document.getElementById('wait');

        form.onsubmit = async (e) => {
            e.preventDefault();
            const q = document.getElementById('userInput').value;
            if(!q) return;

            box.innerHTML += `<div class="user bubble">${q}</div>`;
            document.getElementById('userInput').value = '';
            box.scrollTop = box.scrollHeight;
            wait.classList.remove('hidden');

            try {
                const r = await fetch('/ask', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({query: q})
                });
                const d = await r.json();
                wait.classList.add('hidden');
                box.innerHTML += `<div class="ai bubble">${d.answer}</div>`;
            } catch {
                wait.classList.add('hidden');
                box.innerHTML += `<div class="ai bubble text-red-400">السيرفر خد وقت طويل، جرب تقصر السؤال شوية يا درش.</div>`;
            }
            box.scrollTop = box.scrollHeight;
        };
    </script>
</body>
</html>
