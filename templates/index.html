<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Darsh AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Orbitron:wght@600&display=swap" rel="stylesheet">
    <style>
        body { background: #0b0f1a; color: white; font-family: 'Cairo', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .chat-scroll { flex: 1; overflow-y: auto; padding: 20px 15px 120px 15px; }
        .bubble { max-width: 85%; margin-bottom: 15px; padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.6; }
        .user { background: #2563eb; margin-right: auto; border-bottom-right-radius: 4px; box-shadow: 0 4px 15px rgba(37,99,235,0.2); }
        .ai { background: #1e293b; border: 1px solid #334155; margin-left: auto; border-bottom-left-radius: 4px; }
        .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #0b0f1a; padding: 15px 15px 30px 15px; z-index: 1000; }
        .input-group { background: #1e293b; border: 1px solid #3b82f6; border-radius: 25px; display: flex; overflow: hidden; box-shadow: 0 -5px 20px rgba(0,0,0,0.5); }
        input { flex: 1; background: transparent; border: none; color: white; padding: 12px 20px; outline: none; }
        button { background: #2563eb; padding: 0 25px; font-weight: bold; }
    </style>
</head>
<body>
    <header class="p-4 text-center border-b border-white/5 shadow-lg">
        <h1 style="font-family:'Orbitron'" class="text-xl text-blue-500 tracking-widest">DARSH AI</h1>
    </header>

    <div id="chatBox" class="chat-scroll">
        <div class="ai bubble">أهلاً يا مصطفى! جرب تسألني "مين هو صاحب الصفحة" وشوف الرد الجديد.</div>
    </div>

    <div class="bottom-bar">
        <form id="chatForm" class="input-group">
            <input type="text" id="userInput" placeholder="اكتب سؤالك هنا..." autocomplete="off">
            <button type="submit">بحث</button>
        </form>
    </div>

    <script>
        const form = document.getElementById('chatForm');
        const box = document.getElementById('chatBox');
        const input = document.getElementById('userInput');

        function typeWriter(element, text) {
            let i = 0; element.innerHTML = "";
            const interval = setInterval(() => {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++; box.scrollTop = box.scrollHeight;
                } else { clearInterval(interval); }
            }, 25);
        }

        form.onsubmit = async (e) => {
            e.preventDefault();
            const q = input.value.trim();
            if(!q) return;

            box.innerHTML += `<div class="user bubble">${q}</div>`;
            input.value = ''; box.scrollTop = box.scrollHeight;

            const aiBubble = document.createElement('div');
            aiBubble.className = 'ai bubble';
            aiBubble.innerHTML = "...جاري التفكير";
            box.appendChild(aiBubble);

            try {
                const r = await fetch('/ask', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({query: q})
                });
                const d = await r.json();
                typeWriter(aiBubble, d.answer);
            } catch {
                aiBubble.innerHTML = "عذراً يا مصطفى، فيه حاجة غلط في السيرفر.";
            }
        };
    </script>
</body>
</html>
