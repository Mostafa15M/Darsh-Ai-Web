<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Darsh Research | AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Orbitron:wght@600&display=swap" rel="stylesheet">
    <style>
        body { background: #0b0f1a; color: #f8fafc; font-family: 'Cairo', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .chat-area { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 120px; scroll-behavior: smooth; }
        
        /* فقاعات الشات */
        .bubble { max-width: 85%; margin-bottom: 20px; padding: 14px 18px; border-radius: 20px; font-size: 15px; line-height: 1.6; animation: fadeIn 0.3s ease; }
        .user { background: #2563eb; color: white; margin-right: auto; border-bottom-right-radius: 4px; }
        .ai { background: #1e293b; border: 1px solid #334155; margin-left: auto; border-bottom-left-radius: 4px; }

        /* رفع صندوق الكتابة ليتناسب مع الكيبورد */
        .input-box { position: fixed; bottom: 30px; left: 0; right: 0; padding: 0 15px; z-index: 100; }
        .glass-input { background: rgba(30, 41, 59, 0.9); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* لودر الكتابة */
        .typing-dot { width: 5px; height: 5px; background: #60a5fa; border-radius: 50%; animation: blink 1.4s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body>
    <header class="p-4 text-center border-b border-white/5 bg-[#0b0f1a]">
        <h1 style="font-family:'Orbitron'" class="text-xl font-bold tracking-widest text-blue-500">DARSH RESEARCH</h1>
    </header>

    <div id="chatBox" class="chat-area">
        <div class="ai bubble">أهلاً يا مصطفى! أنا محرك بحث دارش الذكي، اسألني عن أي حاجة وهرد عليك فوراً.</div>
    </div>

    <div class="input-box">
        <form id="searchForm" class="max-w-2xl mx-auto glass-input p-2 flex gap-2 shadow-2xl">
            <input type="text" id="userInput" placeholder="اسأل عن أي معلومة..." autocomplete="off"
                class="flex-1 bg-transparent border-none py-3 px-4 text-sm focus:outline-none">
            <button type="submit" id="sendBtn" class="bg-blue-600 hover:bg-blue-700 px-6 rounded-xl font-bold text-sm transition-all active:scale-95">بحث</button>
        </form>
    </div>

    <script>
        const form = document.getElementById('searchForm');
        const box = document.getElementById('chatBox');
        const input = document.getElementById('userInput');

        // وظيفة الكتابة حرف بحرف (Typewriter Effect)
        function typeWriter(element, text, speed = 25) {
            let i = 0;
            element.innerHTML = "";
            function type() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                    box.scrollTop = box.scrollHeight;
                    setTimeout(type, speed);
                }
            }
            type();
        }

        form.onsubmit = async (e) => {
            e.preventDefault();
            const q = input.value.trim();
            if(!q) return;

            // رسالة المستخدم
            box.innerHTML += `<div class="user bubble">${q}</div>`;
            input.value = '';
            box.scrollTop = box.scrollHeight;

            // لودر مؤقت
            const loadingId = "load-" + Date.now();
            box.innerHTML += `<div id="${loadingId}" class="ai bubble flex gap-1 items-center"><div class="typing-dot"></div><div class="typing-dot" style="animation-delay:0.2s"></div><div class="typing-dot" style="animation-delay:0.4s"></div></div>`;
            box.scrollTop = box.scrollHeight;

            try {
                const r = await fetch('/ask', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({query: q})
                });
                const d = await r.json();
                
                // إزالة اللودر وإضافة فقاعة الذكاء الاصطناعي فارغة للكتابة فيها
                document.getElementById(loadingId).remove();
                const aiBubble = document.createElement('div');
                aiBubble.className = 'ai bubble';
                box.appendChild(aiBubble);
                
                // البدء في الكتابة حرف بحرف
                typeWriter(aiBubble, d.answer);
                
            } catch {
                document.getElementById(loadingId).innerHTML = "عذراً، حصل مشكلة في السيرفر.";
            }
        };
    </script>
</body>
</html>
