<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Darsh AI | حبيب الكل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Orbitron:wght@600&display=swap" rel="stylesheet">
    <style>
        body { background: #050a18; color: white; font-family: 'Cairo', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .chat-box { flex: 1; overflow-y: auto; padding: 20px 15px 140px 15px; scroll-behavior: smooth; }
        .bubble { max-width: 85%; margin-bottom: 20px; padding: 14px 18px; border-radius: 20px; font-size: 15px; line-height: 1.6; }
        .user { background: #2563eb; margin-right: auto; border-bottom-right-radius: 4px; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3); }
        .ai { background: #111827; border: 1px solid #1e3a8a; margin-left: auto; border-bottom-left-radius: 4px; }
        .input-area { position: fixed; bottom: 0; left: 0; right: 0; background: #050a18; padding: 20px 15px 40px 15px; z-index: 1000; }
        .input-group { background: #111827; border: 1px solid #3b82f6; border-radius: 30px; display: flex; overflow: hidden; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 15px 20px; outline: none; }
        button { background: #2563eb; padding: 0 25px; font-weight: bold; transition: 0.3s; }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <header class="p-4 text-center border-b border-blue-900/30">
        <h1 style="font-family:'Orbitron'" class="text-xl text-blue-400 tracking-tighter">DARSH AI</h1>
    </header>

    <div id="chatBox" class="chat-box">
        <div class="ai bubble">يا مساء الجمال على عيونك يا درش.. تحب نحكي في إيه النهاردة؟</div>
    </div>

    <div class="input-area">
        <form id="chatForm" class="input-group">
            <input type="text" id="userInput" placeholder="اكتب لدرش هنا..." autocomplete="off">
            <button type="submit">إرسال</button>
        </form>
    </div>

    <script>
        const form = document.getElementById('chatForm');
        const box = document.getElementById('chatBox');
        const input = document.getElementById('userInput');

        // ميزة الكتابة المتدرجة (نفس شات GPT)
        function typeWriter(element, text) {
            let i = 0; element.innerHTML = "";
            const interval = setInterval(() => {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++; box.scrollTop = box.scrollHeight;
                } else { clearInterval(interval); }
            }, 30);
        }

        form.onsubmit = async (e) => {
            e.preventDefault();
            const q = input.value.trim();
            if(!q) return;

            box.innerHTML += `<div class="user bubble">${q}</div>`;
            input.value = ''; box.scrollTop = box.scrollHeight;

            const aiBubble = document.createElement('div');
            aiBubble.className = 'ai bubble';
            aiBubble.innerHTML = "جاري التفكير في كلام حلو...";
            box.appendChild(aiBubble);

            try {
                const r = await fetch('/ask', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({query: q})
                });
                const d = await r.json();
                typeWriter(aiBubble, d.answer);
            } catch {
                aiBubble.innerHTML = "السيرفر غار من جمالك ووقع!";
            }
        };
    </script>
</body>
</html>
