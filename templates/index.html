<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darsh AI | البحث الذكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #050a18; color: #e2e8f0; font-family: 'Cairo', sans-serif; overflow: hidden; }
        #stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .glass-panel { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); }
        .chat-container { height: calc(100vh - 220px); overflow-y: auto; padding: 20px; scroll-behavior: smooth; }
        
        /* تصميم الفقاعات */
        .msg { max-width: 85%; margin-bottom: 15px; padding: 12px 18px; border-radius: 18px; font-size: 0.95rem; line-height: 1.6; position: relative; }
        .user-msg { background: #2563eb; color: white; margin-right: auto; border-bottom-right-radius: 4px; }
        .ai-msg { background: #1e293b; border: 1px solid #334155; margin-left: auto; border-bottom-left-radius: 4px; }

        /* اللودر الدوار */
        .loader-orbit { width: 30px; height: 30px; position: relative; perspective: 800px; margin: 10px auto; }
        .orbit { position: absolute; width: 100%; height: 100%; border-radius: 50%; border-bottom: 2px solid #60a5fa; animation: rot 1s linear infinite; }
        @keyframes rot { from { transform: rotateX(35deg) rotateY(-45deg) rotateZ(0deg); } to { transform: rotateX(35deg) rotateY(-45deg) rotateZ(360deg); } }
    </style>
</head>
<body class="flex flex-col min-h-screen">
    <canvas id="stars"></canvas>

    <div class="max-w-3xl w-full mx-auto flex-1 flex flex-col p-4">
        <header class="text-center py-6">
            <h1 style="font-family:'Orbitron'" class="text-2xl font-bold tracking-tighter text-blue-500">DARSH AI</h1>
            <p class="text-[10px] text-slate-500 uppercase tracking-widest">Neural Research Engine</p>
        </header>

        <div class="glass-panel rounded-3xl flex-1 flex flex-col overflow-hidden shadow-2xl">
            <div id="chatBox" class="chat-container">
                <div class="ai-msg msg shadow-sm">أهلاً يا مصطفى! أنا جاهز للبحث.. اسألني عن أي حاجة وهجيب لك الخلاصة.</div>
            </div>

            <div id="loading" class="hidden"><div class="loader-orbit"><div class="orbit"></div></div></div>

            <div class="p-4 bg-slate-900/50">
                <form id="chatForm" class="flex gap-2">
                    <input type="text" id="userInput" placeholder="اكتب سؤالك هنا..." 
                        class="flex-1 bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500 text-sm">
                    <button type="submit" class="bg-blue-600 hover:bg-blue-700 px-6 rounded-xl font-bold transition-all shadow-lg shadow-blue-900/20">إرسال</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // كود النجوم
        const canvas = document.getElementById('stars');
        const ctx = canvas.getContext('2d');
        let s=[]; function init(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; s=[]; for(let i=0;i<60;i++)s.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,sp:Math.random()*0.05+0.01}); }
        function draw(){ ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle='#fff'; s.forEach(p=>{ ctx.beginPath(); ctx.arc(p.x,p.y,0.8,0,Math.PI*2); ctx.fill(); p.y+=p.sp; if(p.y>canvas.height)p.y=0; }); requestAnimationFrame(draw); }
        init(); draw();

        const form = document.getElementById('chatForm');
        const box = document.getElementById('chatBox');
        const load = document.getElementById('loading');

        form.onsubmit = async (e) => {
            e.preventDefault();
            const q = document.getElementById('userInput').value;
            if(!q) return;

            box.innerHTML += `<div class="user-msg msg shadow-md">${q}</div>`;
            document.getElementById('userInput').value = '';
            box.scrollTop = box.scrollHeight;
            load.classList.remove('hidden');

            try {
                const r = await fetch('/ask', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({query: q})
                });
                const d = await r.json();
                load.classList.add('hidden');
                box.innerHTML += `<div class="ai-msg msg shadow-sm">${d.answer}</div>`;
            } catch {
                load.classList.add('hidden');
                box.innerHTML += `<div class="ai-msg msg text-red-400">حصل خطأ في الاتصال بالسيرفر.</div>`;
            }
            box.scrollTop = box.scrollHeight;
        };
    </script>
</body>
</html>
