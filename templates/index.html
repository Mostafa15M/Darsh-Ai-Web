<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Darsh AI | النسخة النهائية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; color: white; font-family: 'Cairo', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: #0f172a; border-bottom: 2px solid #1e3a8a; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Orbitron'; font-size: 20px; color: #3b82f6; letter-spacing: 1px; }
        .dev-link { background: #0088cc; color: white; padding: 6px 14px; border-radius: 12px; font-size: 13px; font-weight: bold; text-decoration: none; box-shadow: 0 0 10px rgba(0, 136, 204, 0.4); }
        
        .chat-scroll { flex: 1; overflow-y: auto; padding: 20px 15px 140px 15px; scroll-behavior: smooth; }
        .bubble { max-width: 85%; margin-bottom: 20px; padding: 14px 18px; border-radius: 20px; font-size: 14px; line-height: 1.6; position: relative; }
        .user { background: #2563eb; margin-right: auto; border-bottom-right-radius: 4px; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.2); }
        .ai { background: #1e293b; border: 1px solid #334155; margin-left: auto; border-bottom-left-radius: 4px; }

        .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(2, 6, 23, 0.95); backdrop-filter: blur(10px); padding: 15px 15px 35px 15px; z-index: 1000; border-top: 1px solid #1e293b; }
        .input-group { max-width: 600px; margin: 0 auto; background: #0f172a; border: 2px solid #3b82f6; border-radius: 25px; display: flex; overflow: hidden; transition: 0.3s; }
        .input-group:focus-within { border-color: #60a5fa; box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); }
        input { flex: 1; background: transparent; border: none; color: white; padding: 12px 18px; outline: none; font-size: 15px; }
        button { background: #2563eb; color: white; padding: 0 25px; font-weight: bold; transition: 0.2s; }
        button:active { transform: scale(0.95); }

        /* ستايل الصورة جوه الشات */
        .ai img { border-radius: 12px; margin-top: 10px; border: 1px solid #3b82f6; width: 100%; height: auto; display: block; }
    </style>
</head>
<body>
    <header>
        <div class="logo">DARSH AI</div>
        <a href="https://t.me/DarshEgypt" target="_blank" class="dev-link">حساب المطور</a>
    </header>

    <div id="chatBox" class="chat-scroll">
        <div class="ai bubble">يا مساء الجمال يا مصطفى! أنا "درش" ذكاؤك الاصطناعي الخاص.. اطلب صورة أو اسأل أي سؤال.</div>
    </div>

    <div class="bottom-bar">
        <form id="chatForm" class="input-group">
            <input type="text" id="userInput" placeholder="اسأل درش أو اطلب صورة..." autocomplete="off">
            <button type="submit">إرسال</button>
        </form>
    </div>

    <script>
        const form = document.getElementById('chatForm');
        const box = document.getElementById('chatBox');
        const input = document.getElementById('userInput');

        function typeWriter(element, text, imageUrl) {
            let i = 0; element.innerHTML = "";
            const interval = setInterval(() => {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++; box.scrollTop = box.scrollHeight;
                } else {
                    clearInterval(interval);
                    if(imageUrl) {
                        element.innerHTML += `<img src="${imageUrl}" alt="AI Generated Image">`;
                        box.scrollTop = box.scrollHeight;
                    }
                }
            }, 25);
        }

        form.onsubmit = async (e) => {
            e.preventDefault();
            const q = input.value.trim();
            if(!q) return;

            // رسالة المستخدم
            box.innerHTML += `<div class="user bubble">${q}</div>`;
            input.value = '';
            box.scrollTop = box.scrollHeight;

            // فقاعة تفكير درش
            const aiMsg = document.createElement('div');
            aiMsg.className = 'ai bubble';
            aiMsg.innerHTML = "جاري التفكير...";
            box.appendChild(aiMsg);
            box.scrollTop = box.scrollHeight;

            try {
                const r = await fetch('/ask', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({query: q})
                });
                const d = await r.json();
                typeWriter(aiMsg, d.answer, d.image);
            } catch {
                aiMsg.innerHTML = "معلش السيرفر وقع مني، جرب تاني يا غالي.";
            }
        };
    </script>
</body>
</html>
