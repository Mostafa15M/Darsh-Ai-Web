<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Darsh AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; color: #f1f5f9; font-family: 'Cairo', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .chat-area { flex: 1; overflow-y: auto; padding: 20px 15px 120px 15px; scroll-behavior: smooth; }
        
        /* فقاعات الكلام */
        .bubble { max-width: 85%; margin-bottom: 20px; padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.6; }
        .user { background: #2563eb; margin-right: auto; border-bottom-right-radius: 2px; }
        .ai { background: #1e293b; border: 1px solid #334155; margin-left: auto; border-bottom-left-radius: 2px; }

        /* منطقة الهيدر مع الرابط الصغير */
        header { background: #0f172a; border-bottom: 1px solid #1e293b; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Orbitron'; font-size: 18px; color: #3b82f6; letter-spacing: 1px; }
        .small-link { background: #0088cc; color: white; padding: 5px 12px; border-radius: 10px; font-size: 12px; font-weight: bold; text-decoration: none; transition: 0.3s; }
        .small-link:active { transform: scale(0.95); }

        /* منطقة الإدخال السفلية */
        .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #020617; padding: 15px 15px 30px 15px; z-index: 1000; }
        .input-group { max-width: 600px; margin: 0 auto; background: #0f172a; border: 1px solid #3b82f6; border-radius: 20px; display: flex; overflow: hidden; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 10px 15px; outline: none; font-size: 14px; }
        button { background: #2563eb; padding: 0 18px; font-weight: bold; font-size: 13px; }
    </style>
</head>
<body>
    <header>
        <div class="logo">DARSH AI</div>
        <a href="https://t.me/DarshEgypt" target="_blank" class="small-link">
            حساب المطور
        </a>
    </header>

    <div id="chatBox" class="chat-area">
        <div class="ai bubble">أهلاً يا مصطفى! أنا "درش" ذكاؤك الاصطناعي.. جاهز لأي سؤال.</div>
    </div>

    <div class="bottom-bar">
        <form id="chatForm" class="input-group shadow-lg">
            <input type="text" id="userInput" placeholder="اسأل درش..." autocomplete="off">
            <button type="submit">إرسال</button>
        </form>
    </div>

    <script>
        const form = document.getElementById('chatForm');
        const box = document.getElementById('chatBox');
        const input = document.getElementById('userInput');

        function streamText(element, text) {
            let i = 0; element.innerHTML = "";
            const timer = setInterval(() => {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++; box.scrollTop = box.scrollHeight;
                } else { clearInterval(timer); }
            }, 25);
        }

        form.onsubmit = async (e) => {
            e.preventDefault();
            const q = input.value.trim();
            if(!q) return;

            box.innerHTML += `<div class="user bubble">${q}</div>`;
            input.value = ''; box.scrollTop = box.scrollHeight;

            const aiMsg = document.createElement('div');
            aiMsg.className = 'ai bubble';
            aiMsg.innerHTML = "جاري التفكير...";
            box.appendChild(aiMsg);
            box.scrollTop = box.scrollHeight;

            try {
                const r = await fetch('/ask', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({query: q})
                });
                const d = await r.json();
                streamText(aiMsg, d.answer);
            } catch {
                aiMsg.innerHTML = "حدث خطأ.";
            }
        };
    </script>
</body>
</html>
